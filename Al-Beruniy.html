<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al-Beruniy</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: Arial, sans-serif;
    background:#fff;
    color:#000;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}
.container{
    flex:1;
    max-width:1100px;
    margin:auto;
    padding:40px 20px;

    display:grid;
    grid-template-columns: 1fr 1fr; /* 2 ustun */
    gap:40px;
    align-items:center;
}

/* TEXT BLOK */
.text{
    min-height:300px; /* MUHIM: sakrashni oldini oladi */
}

/* IMAGE BLOK */
.image{
    display:flex;
    justify-content:center;
    align-items:center;
}

.image img{
    width:100%;
    max-width:380px;
    border-radius:10px;
}

/* RESPONSIVE */
@media(max-width:800px){
    .container{
        grid-template-columns: 1fr; /* 1 ustun */
        text-align:center;
    }

    .text{
        min-height:auto; /* mobil uchun o‘chiramiz */
    }
}
.text{
    min-height:300px;
}
/* HEADER */
header{
    background:#111;
    color:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
}

.brand{
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
}

.brand img{height:40px;}

.site-title{
    font-weight:bold;
}

/* FLAGS */
.lang img{
    width:40px;
    height:26px;
    object-fit:cover;
    cursor:pointer;
    margin-left:10px;
}

/* CONTENT */
.container{
    flex:1;
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
    display:flex;
    gap:40px;
    align-items:center;
}

.text{flex:1;}

h1{font-size:40px;margin-bottom:10px;}
p{line-height:1.7;margin-bottom:12px;color:#333;}

/* IMAGE */
.image{flex:1;text-align:center;}
.image img{
    width:100%;
    max-width:380px;
    border-radius:10px;
}

/* FOOTER */
footer{
    background:#111;
    color:#aaa;
    padding:15px 30px;
    display:flex;
    align-items:center;
    margin-top:auto;
}

/* footer layout */
.footer-center{
    flex:1;
    text-align:center;
}

.footer-right{
    display:flex;
    align-items:center;
    gap:10px;
}

/* limon style */
.limon{
    color:#FFD700;
    cursor:pointer;
    font-weight:bold;
}

.footer-logo{
    height:40px;
    cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:800px){
    .container{
        flex-direction:column;
        text-align:center;
    }
}
</style>
</head>

<body>

<header>
    <div class="brand" onclick="goMuseum()">
        <img src="logo.png">
        <span class="site-title" id="siteTitle"></span>
    </div>

    <div class="lang">
        <img src="https://flagcdn.com/w40/uz.png" onclick="setLang('uz')">
        <img src="https://flagcdn.com/w40/ru.png" onclick="setLang('ru')">
        <img src="https://flagcdn.com/w40/gb.png" onclick="setLang('en')">
    </div>
</header>

<div class="container">

    <div class="text" id="content"></div>

    <div class="image">
        <img src="Beruniy.jpg" alt="Ibn Sino">
    </div>

</div>

<footer>

    <div style="width:120px;"></div>

    <div class="footer-center">
        © Barcha huquqlar himoyalangan
    </div>

    <div class="footer-right">
        <span class="limon" onclick="goLimon()">limon.uz</span>
        <img src="main-white-logo.webp" class="footer-logo" onclick="goLimon()">
    </div>

</footer>

<script>

/* HEADER TITLE (3 LANG) */
const titles = {
    uz: "Xiva Ichan Qal’a muzey-qo‘riqxonasi",
    ru: "Хивинский музей-заповедник Ичан-Кала",
    en: "Khiva Ichan Kala State Museum Reserve"
};

/* CONTENT */
const data = {

uz: `
<h1>Abu Rayhon Beruniy</h1>
<p>Buyuk qomusiy olim Abu Rayhon Beruniy o‘rta asr Sharq ilm-fanining yirik namoyandasi hisoblanadi.</p>
<p>U astronomiya, geografiya, matematika, fizika, tarix va etnografiya sohalarida muhim ilmiy tadqiqotlar olib borgan.</p>
<p>Xorazm Ma’mun akademiyasida rahbarlik qilgan. 160 dan ortiq asarlar yozgan.</p>
<p>Uning Yer radiusini aniqlash ishlari va “Hindiston” asari jahon ilmida muhim o‘rin tutadi.</p>
<p><b>Davr:</b> X–XI asr</p>
<p><b>Yo‘nalishlar:</b> Astronomiya, geografiya, matematika</p>
`,

ru: `
<h1>Абу Райхан Беруни</h1>
<p>Великий энциклопедический ученый Абу Райхан Беруни является выдающимся представителем науки Востока средневековья.</p>
<p>Он проводил исследования в области астрономии, географии, математики, физики, истории и этнографии.</p>
<p>Руководил Хорезмской академией Мамуна. Написал более 160 трудов.</p>
<p>Его работы по определению радиуса Земли и книга «Индия» занимают важное место в мировой науке.</p>
<p><b>Период:</b> X–XI века</p>
<p><b>Направления:</b> Астрономия, география, математика</p>
`,

en: `
<h1>Abu Rayhan Beruni</h1>
<p>Abu Rayhan Beruni was a great polymath and a prominent scholar of the medieval East.</p>
<p>He conducted research in astronomy, geography, mathematics, physics, history, and ethnography.</p>
<p>He led the Khorezm Mamun Academy and authored over 160 works.</p>
<p>His studies on the Earth’s radius and his book “India” hold an important place in world science.</p>
<p><b>Period:</b> 10th–11th century</p>
<p><b>Fields:</b> Astronomy, geography, mathematics</p>
`

};

/* LANGUAGE SWITCH */
function setLang(lang){
    document.getElementById("content").innerHTML = data[lang];
    document.getElementById("siteTitle").innerText = titles[lang];
    localStorage.setItem("lang", lang);
}

/* LINKS */
function goMuseum(){
    window.open("https://www.khivamuseum.uz/","_blank");
}

function goLimon(){
    window.open("https://limon.uz/","_blank");
}

/* INIT */
setLang(localStorage.getItem("lang") || "uz");

</script>

</body>
</html>
